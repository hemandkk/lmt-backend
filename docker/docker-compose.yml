version: "3.9"

services:
  postgres:
    image: postgres:17

    container_name: lmt-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: lmt

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]

      interval: 5s

      timeout: 5s

      retries: 10

  backend:
    build:
      context: ..

      dockerfile: docker/Dockerfile

    container_name: lmt-backend

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - ../.env

    ports:
      - "8000:8000"

    volumes:
      - ..:/app

    command: >
      bash -c " alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port
      8000 --reload "

volumes:
  postgres_data:
